name: powersync_sqlite_core_tests
publish_to: "none"
version: 0.0.1
description: Tests for powersync-sqlite-core
environment:
  sdk: ^3.4.0

dependencies:
  sqlite3: ^3.1.4
  bson: ^5.0.5

dev_dependencies:
  test: ^1.25.0
  test_descriptor: ^2.0.2
  file: ^7.0.1
  sqlite3_test: ^0.2.0
  fake_async: ^1.3.3
  convert: ^3.1.2
  meta: ^1.16.0
  path: ^1.9.1

dependency_overrides:
  # TODO: Remove after https://github.com/simolus3/sqlite3.dart/commit/97268a5b32cf6313dd670e6fa57ae88d38a6564b
  # gets released.
  sqlite3:
    git:
      url: https://github.com/simolus3/sqlite3.dart.git
      path: sqlite3
      ref: main

# See https://pub.dev/documentation/sqlite3/latest/topics/hook-topic.html
hooks:
  user_defines:
    sqlite3:
      source: source
      path: ../crates/sqlite/sqlite/sqlite3.c
      # Used in sync_test.dart to ensure the core extension dosn't leave any
      # busy statements behind.
      defines:
        - SQLITE_ENABLE_STMTVTAB

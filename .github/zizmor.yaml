# Configuration for https://zizmor.sh/, a static analysis tool for GitHub actions.
rules:
  unpinned-uses:
    config:
      policies:
        "actions/*": ref-pin
        "dart-lang/*": ref-pin
        "rust-lang/*": ref-pin
        "gradle/actions/wrapper-validation": ref-pin
        "emscripten-core/setup-emsdk": ref-pin
  anonymous-definition:
    disable: true
  concurrency-limits:
    ignore:
      # We don't need to limit concurrency for publishing, as only maintainers can
      # push tags.
      - release.yml:2:1

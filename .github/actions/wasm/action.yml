name: "Build wasm libraries"
description: "Create artifact for wasm libraries"

runs:
  using: "composite"
  steps:
    - name: Install Rust Nightly
      shell: bash
      run: rustup install

    - name: Build WASM
      shell: bash
      run: ./tool/build_wasm.sh

    - uses: actions/upload-artifact@v4
      with:
        name: wasm-library
        retention-days: 14
        path: libpowersync-wasm.a
